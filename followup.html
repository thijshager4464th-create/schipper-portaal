<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Schipper Kozijnen — Offerte Follow-up</title>
<link rel="icon" type="image/png" href="images.png">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#f5f5f5;min-height:100vh;color:#1a1a2e}
.topbar{background:linear-gradient(135deg,#B01419,#E31E24);color:white;padding:14px 32px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 4px 20px rgba(227,30,36,0.3);flex-wrap:wrap;gap:10px}
.topbar-left{display:flex;align-items:center;gap:16px}
.topbar-logo{background:white;border-radius:8px;padding:4px 10px;display:flex;align-items:center}
.topbar-logo img{height:36px;object-fit:contain}
.topbar-title{font-size:16px;font-weight:800}
.topbar-back{background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.3);color:white;padding:7px 14px;border-radius:8px;cursor:pointer;font-size:12px;font-weight:600;text-decoration:none}
.topbar-back:hover{background:rgba(255,255,255,0.25)}
.content{max-width:900px;margin:0 auto;padding:32px 24px}
.intro{background:white;border-radius:16px;padding:28px 32px;margin-bottom:24px;box-shadow:0 2px 8px rgba(0,0,0,0.06);border-left:5px solid #E31E24}
.intro h1{font-size:22px;font-weight:800;color:#1a1a2e;margin-bottom:6px}
.intro p{font-size:14px;color:#888;line-height:1.6}
.form-card{background:white;border-radius:16px;padding:28px;box-shadow:0 2px 8px rgba(0,0,0,0.06);margin-bottom:24px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:600px){.form-grid{grid-template-columns:1fr}}
.form-field{display:flex;flex-direction:column;gap:6px}
.form-field label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:#888}
.form-field input,.form-field select,.form-field textarea{padding:10px 14px;border:2px solid #eee;border-radius:8px;font-size:13px;outline:none;font-family:inherit;transition:border 0.2s;background:white}
.form-field input:focus,.form-field select:focus,.form-field textarea:focus{border-color:#E31E24}
.form-field textarea{resize:vertical;min-height:80px}
.form-field.full{grid-column:1/-1}
.type-btns{display:flex;gap:8px;flex-wrap:wrap}
.type-btn{padding:8px 16px;border-radius:8px;border:2px solid #eee;background:white;font-size:13px;font-weight:600;cursor:pointer;transition:all 0.15s;color:#555}
.type-btn.active{border-color:#E31E24;background:#fff0f0;color:#E31E24}
.toon-btns{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px}
.toon-btn{padding:10px 20px;border-radius:10px;border:2px solid #eee;background:white;font-size:13px;font-weight:700;cursor:pointer;transition:all 0.15s;color:#555}
.toon-btn.active{border-color:#E31E24;background:#E31E24;color:white}
.genereer-btn{width:100%;padding:14px;background:linear-gradient(135deg,#B01419,#E31E24);color:white;border:none;border-radius:10px;font-size:15px;font-weight:800;cursor:pointer;margin-top:8px;display:flex;align-items:center;justify-content:center;gap:10px}
.genereer-btn:hover{opacity:0.9}
.genereer-btn:disabled{opacity:0.6;cursor:not-allowed}
.resultaat-card{background:white;border-radius:16px;padding:28px;box-shadow:0 2px 8px rgba(0,0,0,0.06);display:none}
.resultaat-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:10px}
.resultaat-titel{font-size:15px;font-weight:800;color:#1a1a2e}
.copy-btn{padding:8px 16px;background:#f0fff4;border:1px solid #a8e6c0;color:#2D6A4F;border-radius:8px;cursor:pointer;font-size:13px;font-weight:700}
.copy-btn:hover{background:#2D6A4F;color:white}
.copy-btn.gekopieerd{background:#2D6A4F;color:white}
.resultaat-tekst{background:#f8f8f8;border-radius:10px;padding:20px;font-size:14px;line-height:1.8;color:#1a1a2e;white-space:pre-wrap;border-left:4px solid #E31E24;min-height:200px}
.laden{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:40px;display:none}
.spinner{width:40px;height:40px;border:4px solid #f0f0f0;border-top-color:#E31E24;border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.laden-tekst{font-size:14px;color:#888;font-weight:600}
.tip-strip{background:#fff8e8;border-radius:10px;padding:14px 18px;font-size:13px;color:#855;line-height:1.6;margin-bottom:16px;border-left:4px solid #f39c12}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <div class="topbar-logo">
      <img src="images.png" alt="Schipper Kozijnen" height="36" onerror="this.outerHTML='<span style=\'font-size:16px;font-weight:900;color:#E31E24\'>S<span style=\'color:#1a1a2e\'>chipper</span></span>'">
    </div>
    <div class="topbar-title">Offerte Follow-up Generator</div>
  </div>
  <a href="index.html" class="topbar-back">← Terug naar portaal</a>
</div>

<div class="content">
  <div class="intro">
    <h1>Offerte Follow-up Generator</h1>
    <p>Vul de klantgegevens in en genereer automatisch een professionele follow-up voor WhatsApp of e-mail. Gebruik AI om de perfecte toon te vinden.</p>
  </div>

  <div class="form-card">
    <div class="form-grid">
      <div class="form-field">
        <label>Naam klant</label>
        <input type="text" id="klantNaam" placeholder="bijv. de heer Jansen">
      </div>
      <div class="form-field">
        <label>Bedrag offerte</label>
        <input type="text" id="bedrag" placeholder="bijv. €14.500">
      </div>
      <div class="form-field">
        <label>Laatste contactmoment</label>
        <input type="text" id="contact" placeholder="bijv. 2 weken geleden">
      </div>
      <div class="form-field">
        <label>Type aanvraag</label>
        <input type="text" id="aanvraag" placeholder="bijv. dakkapel achterzijde">
      </div>
      <div class="form-field full">
        <label>Reden van twijfel (optioneel)</label>
        <textarea id="twijfel" placeholder="bijv. klant twijfelt over prijs, wil vergelijken met concurrent..."></textarea>
      </div>
      <div class="form-field full">
        <label>Extra info (optioneel)</label>
        <textarea id="extraInfo" placeholder="bijv. klant heeft subsidie aangevraagd, partner moet ook akkoord..."></textarea>
      </div>
      <div class="form-field full">
        <label>Type bericht</label>
        <div class="type-btns">
          <button class="type-btn active" onclick="setType(this,'whatsapp')">📱 WhatsApp</button>
          <button class="type-btn" onclick="setType(this,'email')">📧 E-mail</button>
          <button class="type-btn" onclick="setType(this,'beide')">📱📧 Beide</button>
        </div>
      </div>
      <div class="form-field full">
        <label>Toon</label>
        <div class="type-btns">
          <button class="type-btn active" onclick="setToon(this,'vriendelijk')">😊 Vriendelijk</button>
          <button class="type-btn" onclick="setToon(this,'zakelijk')">💼 Zakelijk</button>
          <button class="type-btn" onclick="setToon(this,'urgent')">⚡ Urgentie</button>
          <button class="type-btn" onclick="setToon(this,'subsidie')">💰 Subsidie focus</button>
        </div>
      </div>
    </div>
    <button class="genereer-btn" id="genereerBtn" onclick="genereer()">
      <span>✨ Genereer Follow-up</span>
    </button>
  </div>

  <div class="laden" id="ladenDiv">
    <div class="spinner"></div>
    <div class="laden-tekst">AI schrijft je follow-up...</div>
  </div>

  <div class="resultaat-card" id="resultaatCard">
    <div class="tip-strip" id="tipStrip"></div>
    <div id="resultaatBlokken"></div>
  </div>
</div>

<script>
var berichtType = "whatsapp";
var toon = "vriendelijk";

function setType(btn, type) {
  berichtType = type;
  var btns = btn.parentElement.querySelectorAll(".type-btn");
  for (var i = 0; i < btns.length; i++) btns[i].classList.remove("active");
  btn.classList.add("active");
}

function setToon(btn, t) {
  toon = t;
  var btns = btn.parentElement.querySelectorAll(".type-btn");
  for (var i = 0; i < btns.length; i++) btns[i].classList.remove("active");
  btn.classList.add("active");
}

function kopieer(id, btn) {
  var tekst = document.getElementById(id).textContent;
  navigator.clipboard.writeText(tekst).then(function() {
    btn.textContent = "✓ Gekopieerd!";
    btn.classList.add("gekopieerd");
    setTimeout(function() {
      btn.textContent = "Kopieer";
      btn.classList.remove("gekopieerd");
    }, 2000);
  });
}

async function genereer() {
  var naam = document.getElementById("klantNaam").value.trim();
  var bedrag = document.getElementById("bedrag").value.trim();
  var contact = document.getElementById("contact").value.trim();
  var aanvraag = document.getElementById("aanvraag").value.trim();
  var twijfel = document.getElementById("twijfel").value.trim();
  var extra = document.getElementById("extraInfo").value.trim();

  if (!naam || !aanvraag) {
    alert("Vul minimaal de naam van de klant en het type aanvraag in.");
    return;
  }

  document.getElementById("genereerBtn").disabled = true;
  document.getElementById("ladenDiv").style.display = "flex";
  document.getElementById("resultaatCard").style.display = "none";

  var toonOmschrijving = {
    vriendelijk: "vriendelijk, warm en persoonlijk maar professioneel",
    zakelijk: "zakelijk, kort en to-the-point",
    urgent: "met een subtiel gevoel van urgentie, zonder opdringerig te zijn",
    subsidie: "met focus op de beschikbare Nij Begun subsidie als extra motivatie"
  }[toon];

  var typeInstructie = berichtType === "whatsapp"
    ? "Schrijf ALLEEN een WhatsApp bericht. Kort, persoonlijk, max 5 zinnen. Geen formele aanhef."
    : berichtType === "email"
    ? "Schrijf ALLEEN een e-mail met een onderwerpregel. Formeler en uitgebreider dan WhatsApp."
    : "Schrijf ZOWEL een WhatsApp bericht ALS een e-mail. Geef beide duidelijk aan met 'WHATSAPP:' en 'EMAIL:' als kopje.";

  var prompt = "Je bent een professionele verkoopadviseur bij Schipper Kozijnen, een gerenommeerd kozijnen- en dakkapellenbedrijf in Groningen.\n\n" +
    "Schrijf een follow-up bericht voor de volgende situatie:\n" +
    "- Klant: " + naam + "\n" +
    "- Type aanvraag: " + aanvraag + "\n" +
    (bedrag ? "- Offertebedrag: " + bedrag + "\n" : "") +
    (contact ? "- Laatste contact: " + contact + " geleden\n" : "") +
    (twijfel ? "- Reden van twijfel: " + twijfel + "\n" : "") +
    (extra ? "- Extra info: " + extra + "\n" : "") +
    "\nToon: " + toonOmschrijving + "\n" +
    typeInstructie + "\n\n" +
    "Schrijf vanuit de naam van de adviseur van Schipper Kozijnen. Sluit af met een uitnodiging om contact op te nemen. Gebruik geen placeholders zoals [naam adviseur] - schrijf gewoon 'Met vriendelijke groet, Schipper Kozijnen' of vergelijkbaar.\n\n" +
    "Geef ALLEEN de berichttekst terug, geen uitleg of commentaar.";

  try {
    var response = await fetch("/api/claude", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({
        model: "claude-haiku-4-5-20251001",
        max_tokens: 1000,
        messages: [{role: "user", content: prompt}]
      })
    });

    var data = await response.json();
    var tekst = data.content[0].text;

    document.getElementById("ladenDiv").style.display = "none";
    document.getElementById("resultaatCard").style.display = "block";

    var tipTeksten = {
      whatsapp: "💡 WhatsApp tip: Stuur op een werkdag tussen 9:00 en 17:00. Voeg een vriendelijke openingszin toe als je de klant al goed kent.",
      email: "💡 E-mail tip: Stuur op dinsdag of woensdag ochtend voor de hoogste openingsrate. Voeg je telefoonnummer toe in de handtekening.",
      beide: "💡 Strategie tip: Stuur eerst de WhatsApp als persoonlijk contact, en de e-mail als officieel bevestiging. Wacht 2-3 dagen tussen beide."
    };
    document.getElementById("tipStrip").textContent = tipTeksten[berichtType];

    var html = "";
    if (berichtType === "beide") {
      var delen = tekst.split(/WHATSAPP:|EMAIL:/i).filter(function(s) { return s.trim(); });
      var waLabels = ["WhatsApp bericht", "E-mail"];
      var icons = ["📱", "📧"];
      for (var i = 0; i < delen.length; i++) {
        var id = "tekst" + i;
        html += "<div style='margin-bottom:24px'>";
        html += "<div class='resultaat-header'><div class='resultaat-titel'>" + icons[i] + " " + (waLabels[i] || "Bericht") + "</div>";
        html += "<button class='copy-btn' onclick='kopieer(\"" + id + "\",this)'>Kopieer</button></div>";
        html += "<div class='resultaat-tekst' id='" + id + "'>" + delen[i].trim() + "</div></div>";
      }
    } else {
      html += "<div class='resultaat-header'>";
      html += "<div class='resultaat-titel'>" + (berichtType === "whatsapp" ? "📱 WhatsApp bericht" : "📧 E-mail") + "</div>";
      html += "<button class='copy-btn' onclick='kopieer(\"tekst0\",this)'>Kopieer</button></div>";
      html += "<div class='resultaat-tekst' id='tekst0'>" + tekst + "</div>";
    }

    document.getElementById("resultaatBlokken").innerHTML = html;
  } catch(e) {
    document.getElementById("ladenDiv").style.display = "none";
    alert("Er ging iets mis. Probeer opnieuw.");
  }

  document.getElementById("genereerBtn").disabled = false;
}
</script>
</body>
</html>
